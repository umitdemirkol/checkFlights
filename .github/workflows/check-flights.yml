name: Check Flight Prices

on:
  schedule:
    # Her 4 saatte bir çalışır (RapidAPI ücretsiz limit: 50 istek/ay)
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      reset_cache:
        description: "Önbelleği sıfırla (fiyat geçmişi + hoş geldin yeniden)"
        required: false
        default: false
        type: boolean

jobs:
  check-prices:
    runs-on: ubuntu-latest
    environment: UmidoKey

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore price cache
        uses: actions/cache@v4
        with:
          path: |
            price_cache.json
            notify_state.json
          # Anahtar değişince eski cache kullanılmaz (temiz başlangıç)
          key: flight-tracker-v3-${{ github.run_id }}
          restore-keys: |
            flight-tracker-v3-

      - name: Clear flight cache (manual reset)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reset_cache }}
        run: rm -f price_cache.json notify_state.json

      - name: Check flight prices
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/check_flights.py
